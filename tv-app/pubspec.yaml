name: masjid_monitor_tv
description: Masjid Monitor TV Box Application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core dependencies
  http: ^1.1.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  
  # Audio & Notifications
  audioplayers: ^5.2.1
  flutter_local_notifications: ^16.3.2
  
  # Device & Screen
  wakelock_plus: ^1.1.4
  screen_brightness: ^1.0.0
  
  # Background Service
  background_fetch: ^1.3.2
  workmanager: ^0.5.2
  
  # UI Components
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  video_player: ^2.8.1
  
  # Date/Time
  intl: ^0.19.0
  hijri: ^3.0.0
  adhan: ^2.0.0
  
  # Utils
  logger: ^2.0.2
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/audio/
    - assets/images/
    - assets/fonts/
  
  fonts:
    - family: Digital
      fonts:
        - asset: assets/fonts/digital-7.ttf
    - family: Arabic
      fonts:
        - asset: assets/fonts/arabic.ttf
